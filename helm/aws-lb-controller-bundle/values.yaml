# =============================================================================
# BUNDLE-ONLY — Keys used only by the bundle chart (not forwarded to workload)
# =============================================================================

bundleNameOverride: ""
fullBundleNameOverride: ""

ociRepositoryUrl: oci://gsoci.azurecr.io/charts/giantswarm/aws-load-balancer-controller

# =============================================================================
# UPSTREAM — Controller values (forwarded under "upstream:" to the workload chart)
# =============================================================================
# The giantswarm.workloadValues helper maps these flat values into
# upstream.* for the workload chart. The image fields are combined:
#   image.registry + image.name -> upstream.image.repository

image:
  registry: gsoci.azurecr.io
  name: giantswarm/aws-load-balancer-controller
  tag: v3.0.0
  pullPolicy: IfNotPresent

# The name of the Kubernetes cluster. A non-empty value is required.
# For GS clusters the clusterName is set automatically.
clusterName: ""

replicaCount: 2

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

priorityClassName: system-cluster-critical

serviceAccount:
  create: true
  annotations: {}
  automountServiceAccountToken: true

defaultTargetType: instance

defaultTags: {}

serviceMonitor:
  enabled: true
  interval: 1m

enableServiceMutatorWebhook: true

configureDefaultAffinity: true

# =============================================================================
# EXTRAS — GS-specific values (forwarded at top level to the workload chart)
# =============================================================================

verticalPodAutoscaler:
  enabled: true

global:
  podSecurityStandards:
    enforced: false
