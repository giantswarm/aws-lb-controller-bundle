apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    {{- include "extras.labels" . | nindent 4 }}
  name: {{ include "extras.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  egress:
    - {}
  ingress:
    - ports:
        - port: {{ .Values.upstream.webhookBindPort | default 9443 }}
          protocol: TCP
        - port: {{ (split ":" (default "" .Values.upstream.metricsBindAddr))._1 | default 8080 }}
          protocol: TCP
  podSelector:
    matchLabels:
      {{- include "extras.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
