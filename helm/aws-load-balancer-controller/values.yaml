# =============================================================================
# EXTRAS — Giant Swarm specific values (not in upstream chart)
# =============================================================================

nameOverride: ""
fullnameOverride: ""

verticalPodAutoscaler:
  enabled: true

global:
  podSecurityStandards:
    enforced: false

# =============================================================================
# UPSTREAM — Values passed to the upstream sub-chart (alias: upstream)
# =============================================================================

upstream:
  # CRITICAL: nameOverride must be set to preserve selector labels during upgrade.
  # The alias changes .Chart.Name inside the sub-chart; this restores it.
  nameOverride: aws-load-balancer-controller

  image:
    repository: gsoci.azurecr.io/giantswarm/aws-load-balancer-controller
    tag: v3.0.0
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi

  priorityClassName: system-cluster-critical

  podSecurityContext:
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
      runAsNonRoot: true

  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault

  # The name of the Kubernetes cluster. A non-empty value is required.
  # For GS clusters the clusterName is set automatically.
  clusterName: ""

  # Default target type for overlay-based CNIs (e.g. Cilium with masquerading)
  defaultTargetType: instance

  serviceMonitor:
    enabled: true
    interval: 1m

  serviceAccount:
    create: true
    annotations: {}
    automountServiceAccountToken: true

  enableServiceMutatorWebhook: true

  configureDefaultAffinity: true

  defaultTags: {}
